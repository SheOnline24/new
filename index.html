
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirect</title>
<script>
// ===== ТВОИ ССЫЛКИ =====
const DATING = "https://tone.affomelody.com/click?pid=6350&offer_id=25";
const CASINO = "https://onlinepnpbit.com/2Vi4txHl/";

// ===== ЛОГИКА РЕДИРЕКТА =====
// Проверяем, был ли пользователь уже направлен на дейтинг
if (!localStorage.getItem("firstVisit")) {
    // Первый заход — редирект на дейтинг
    localStorage.setItem("firstVisit", "true");
    window.location.href = DATING;
} else {
    // Второй заход (возврат) — редирект на казино
    window.location.href = CASINO;
}
</script>
</head>
<body>
<!-- Пустая страница, редирект происходит мгновенно -->
</body>
</html>
