<style>

body{

<body>

</div>

<script>

// ссылки
const TG="https://t.me/+NFHjJC5nOndlZjky";

const CASINO="https://onlinepnpbit.com/2Vi4txHl/";

// язык
let lang=(navigator.language||"en").slice(0,2);

const texts={

en:{

returnText:"No Stars? Try free 👇",

},

fr:{

},

es:{

returnText:"¿No Stars? Prueba gratis 👇",

},

it:{

},

pt:{
chat:["Ela está online...","Esperando sua mensagem 💬"],
btn:"Abrir Telegram",
returnText:"Sem Stars? Teste grátis 👇",

},

nl:{
chat:["Ze is online...","Wacht op je bericht 💬"],

btn:"Telegram'a git",
returnText:"Stars yok mu? Ücretsiz dene 👇",
returnBtn:"Devam"
}

};

if(!texts[lang]) lang="en";

// элементы
const chat=document.getElementById("chat");
const btn=document.getElementById("mainBtn");
const popup=document.getElementById("popup");

// стиль кнопки
const isIOS=/iphone|ipad/i.test(navigator.userAgent);
btn.classList.add(isIOS?"ios":"android");

// казино
function goCasino(){
window.location.href=CASINO;
}

// показать возврат
function showReturn(){

chat.innerText=texts[lang].returnText;

btn.innerText=texts[lang].returnBtn;

btn.onclick=()=>{

localStorage.setItem("dating_clicked","1");

window.location.href=DATING;

};

setTimeout(()=>{
popup.style.display="block";
},3000+Math.random()*2000);

}

// проверка возврата из TG
function checkReturn(){

let tgTime=localStorage.getItem("tg_time");

if(tgTime){

let diff=Date.now()-parseInt(tgTime);

if(diff>2000){

showReturn();

localStorage.removeItem("tg_time");

}

}

}

// возврат после Dating
function checkDatingReturn(){

if(localStorage.getItem("dating_clicked")){

popup.style.display="block";

localStorage.removeItem("dating_clicked");

}

}

// прогрев чат
let i=0;

function typeChat(){

if(i<texts[lang].chat.length){

chat.innerText=texts[lang].chat[i];

i++;

setTimeout(typeChat,1500);

}

}

typeChat();

// кнопка
btn.innerText=texts[lang].btn;

btn.onclick=()=>{

localStorage.setItem("tg_time",Date.now());

window.location.href=TG;

};

// авто редирект если человек тупит
setTimeout(()=>{
window.location.href=DATING;
},15000);

// проверки
setInterval(checkReturn,1000);
setInterval(checkDatingReturn,1000);

</script>
