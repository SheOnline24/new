<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0e1621;
color:white;
}

/* TOP BAR */

.topbar{
display:flex;
align-items:center;
padding:12px;
background:#17212b;
}

.avatar{
width:45px;
height:45px;
border-radius:50%;
overflow:hidden;
margin-right:10px;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.name{
font-size:16px;
font-weight:bold;
}

.online{
font-size:12px;
color:#5cff7a;
}

/* CHAT */

#chat{
padding:15px;
margin-bottom:100px;
}

.msg{
background:#182533;
padding:10px 14px;
border-radius:10px;
margin:8px 0;
max-width:240px;
animation:fade .4s;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

#typing{
color:#aaa;
font-size:13px;
display:none;
padding:0 15px;
}

/* BUTTON */

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#17212b;
padding:14px;
text-align:center;
}

/* АНИМИРОВАННАЯ КНОПКА */

button{

padding:14px 28px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
color:white;

background:linear-gradient(45deg,#ff2e63,#ff7a18);

box-shadow:0 0 15px rgba(255,46,99,0.7);

animation:pulse 1.6s infinite;

display:none;

}

@keyframes pulse{

0%{transform:scale(1);box-shadow:0 0 10px rgba(255,46,99,0.5);}
50%{transform:scale(1.08);box-shadow:0 0 25px rgba(255,46,99,1);}
100%{transform:scale(1);box-shadow:0 0 10px rgba(255,46,99,0.5);}

}

button:hover{

transform:scale(1.15);

}

/* NOTIFY */

#notify{

position:fixed;
top:20px;
right:20px;
background:#222;
padding:10px 15px;
border-radius:8px;
font-size:14px;
display:none;

}

/* CASINO */

#casino{

position:fixed;
bottom:100px;
right:20px;
background:#ff2e63;
padding:12px 16px;
border-radius:10px;
cursor:pointer;
display:none;

}

</style>

</head>

<body>

<div class="topbar">

<div class="avatar">
<img id="avatar">
</div>

<div>
<div class="name" id="name"></div>
<div class="online">online</div>
</div>

</div>

<div id="chat"></div>

<div id="typing">typing...</div>

<div class="bottom">
<button id="btn">Continue chat ❤️</button>
</div>

<div id="notify">💬 New message</div>

<div id="casino">🎰 Bonus</div>

<script>

/* ССЫЛКИ */

const DATING="https://kfl2prr.datelovelygirls.com/vv6pzuc?s1=Online24";
const CASINO="https://onlinepnpbit.com/2Vi4txHl/";


/* АВАТАР */

let avatarId=Math.floor(Math.random()*90);

document.getElementById("avatar").src="https://randomuser.me/api/portraits/women/"+avatarId+".jpg";


/* ИМЕНА */

const names=["Anna","Mila","Sofia","Emma","Lena","Julia","Sara","Laura","Nina"];

let girl=names[Math.floor(Math.random()*names.length)];

document.getElementById("name").innerText=girl;


/* ЯЗЫК */

let lang=navigator.language.slice(0,2);


/* ДИАЛОГИ */

const dialogs={

en:[

["Hey 😉","I saw you here...","Are you alone tonight?"],

["Hi... you look interesting 😘","Where are you from?","Want to chat privately?"],

["Hey handsome 😏","I was checking your profile","Can we talk in private?"]

],

ru:[

["Привет 😉","Я тебя здесь заметила","Ты один сегодня?"],

["Привет 😘","Ты выглядишь интересно","Хочешь пообщаться?"],

["Хей 😏","Мне понравился твой профиль","Пойдём в приват?"]

]

};

if(!dialogs[lang]) lang="en";

/* СЛУЧАЙНЫЙ ДИАЛОГ */

let msgs=dialogs[lang][Math.floor(Math.random()*dialogs[lang].length)];


let chat=document.getElementById("chat");

let typing=document.getElementById("typing");

let btn=document.getElementById("btn");


function addMsg(t){

let d=document.createElement("div");

d.className="msg";

d.innerText=t;

chat.appendChild(d);

}


/* ЧАТ */

function start(){

typing.style.display="block";

setTimeout(()=>{

typing.style.display="none";

addMsg(msgs[0]);

setTimeout(()=>{

typing.style.display="block";

setTimeout(()=>{

typing.style.display="none";

addMsg(msgs[1]);

setTimeout(()=>{

typing.style.display="block";

setTimeout(()=>{

typing.style.display="none";

addMsg(msgs[2]);

btn.style.display="inline-block";

},1200);

},1500);

},1200);

},1200);

},1200);

}

setTimeout(start,2000);


/* КНОПКА */

btn.onclick=()=>{

window.location.href=DATING;

}


/* NOTIFY */

setTimeout(()=>{

document.getElementById("notify").style.display="block";

},3500);


/* CASINO */

setTimeout(()=>{

document.getElementById("casino").style.display="block";

},9000);

document.getElementById("casino").onclick=()=>{

window.location.href=CASINO;

}

</script>

</body>
</html>
