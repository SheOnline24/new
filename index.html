<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirect</title>
<script>
  // Ссылки
  const SMARTLINK = "https://your-smartlink.com";
  const CASINO = "https://onlinepnpbit.com/2Vi4txHl/";

  // Проверка первого захода
  if (!sessionStorage.getItem("visited")) {
    // Первый заход → смарт-линк
    sessionStorage.setItem("visited", "1");
    window.location.href = SMARTLINK;
  } else {
    // Возврат → казино
    window.location.href = CASINO;
  }
</script>
</head>
<body>
<!-- Пустая страница, ничего не отображается -->
</body>
</html>
