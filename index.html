<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store">

<title>Online</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.header{
background:#1c1c1c;
padding:15px;
font-size:18px;
}

.chat{
padding:30px;
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
margin-bottom:10px;
}

.btn{
display:inline-block;
padding:14px 30px;
background:linear-gradient(90deg,#ff6a00,#ff0066);
color:white;
border-radius:10px;
text-decoration:none;
font-size:18px;
margin-top:20px;
background-size:200% 200%;
animation:shine 4s ease infinite;
}

@keyframes shine{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.casinoBanner{
position:fixed;
bottom:25px;
right:20px;
background:#1c1c1c;
padding:14px 18px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
display:none;
animation:popup 0.7s ease;
}

@keyframes popup{
0%{transform:translateY(60px);opacity:0}
100%{transform:translateY(0);opacity:1}
}

.casinoBtn{
display:inline-block;
padding:10px 20px;
background:linear-gradient(90deg,#ff6a00,#ff0066);
border-radius:8px;
color:white;
text-decoration:none;
margin-top:8px;
font-size:15px;
}

</style>

<script>

const datingLink = "https://tone.affomelody.com/click?pid=6350&offer_id=25";
const casinoLink = "https://example-casino.com";

let step = localStorage.getItem("step");

if(!step){
localStorage.setItem("step","1");
}

window.onpageshow = function(event){

let step = localStorage.getItem("step");

if(step=="2"){
showCasino();
}

if(step=="3"){
window.location.href = datingLink;
}

};

function startChat(){

localStorage.setItem("step","2");
window.location.href = datingLink;

}

function showCasino(){

setTimeout(()=>{
document.getElementById("casinoBanner").style.display="block";
localStorage.setItem("step","3");
},1200);

}

</script>

</head>

<body>

<div class="header">
Online • <span id="users"></span>
</div>

<div class="chat">

<img class="avatar" src="https://avatars.mds.yandex.net/i?id=11eabdf694458090418f21c78f442ad0_l-5277647-images-thumbs&ref=rim&n=13&w=736&h=920">

<h2>Anna</h2>

<p>Hi... are you alone right now? 😉</p>

<a class="btn" onclick="startChat()">Start Chat</a>

</div>

<div class="casinoBanner" id="casinoBanner">

🎁 Bonus available

<br>

<a class="casinoBtn" href="https://example-casino.com">Claim</a>

</div>

<script>

function updateUsers(){
let num = Math.floor(Math.random()*120)+180;
document.getElementById("users").innerText = num;
}

setInterval(updateUsers,3000);
updateUsers();

</script>

</body>
</html>
