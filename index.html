<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norm Script Multilang</title>
<style>
body { font-family: Arial, sans-serif; background: #111; color: #fff; text-align: center; padding: 50px; }
button { padding: 14px 25px; font-size: 18px; background:#ff2e63; color:white; border:none; border-radius:8px; cursor:pointer; margin-top:20px; }
#chat, #fakeTyping, #returnBlock, #casinoPopup { display: none; margin-top: 30px; }
.fakeTyping { font-style: italic; color: #aaa; margin-top: 20px; }
</style>
</head>
<body>

<h1>She is online...</h1>

<div id="chat">
  <p>Waiting for your message</p>
  <button id="joinTelegram">Join Telegram</button>
</div>

<div id="fakeTyping" class="fakeTyping"></div>

<div id="returnBlock">
  <h2></h2>
  <p></p>
  <p></p>
  <button id="continueWithoutStars"></button>
</div>

<div id="casinoPopup">
  <h2>🎁 Bonus available!</h2>
  <button id="getCasinoBonus">Get Bonus</button>
</div>

<script>
// ===== Настройки офферов =====
const DATING = "https://tone.affomelody.com/click?pid=6350&offer_id=25";
const CASINO = "https://onlinepnpbit.com/2Vi4txHl/";

// ===== Локализация =====
const locales = {
  en: { typing: "She is typing...", starRequired: "⭐ Telegram Stars required", noStars: "You don't have Stars", continue: "Continue without Stars" },
  ru: { typing: "Она печатает...", starRequired: "⭐ Требуются Telegram Stars", noStars: "У тебя нет Stars", continue: "Продолжить без Stars" },
  de: { typing: "Sie tippt...", starRequired: "⭐ Telegram Stars erforderlich", noStars: "Du hast keine Stars", continue: "Ohne Stars fortfahren" },
  fr: { typing: "Elle écrit...", starRequired: "⭐ Telegram Stars requis", noStars: "Tu n'as pas de Stars", continue: "Continuer sans Stars" },
  es: { typing: "Ella está escribiendo...", starRequired: "⭐ Se requieren Telegram Stars", noStars: "No tienes Stars", continue: "Continuar sin Stars" },
  it: { typing: "Sta scrivendo...", starRequired: "⭐ Telegram Stars richiesti", noStars: "Non hai Stars", continue: "Continua senza Stars" },
  nl: { typing: "Ze is aan het typen...", starRequired: "⭐ Telegram Stars vereist", noStars: "Je hebt geen Stars", continue: "Doorgaan zonder Stars" },
  pl: { typing: "Ona pisze...", starRequired: "⭐ Wymagane Telegram Stars", noStars: "Nie masz Stars", continue: "Kontynuuj bez Stars" },
  pt: { typing: "Ela está digitando...", starRequired: "⭐ Telegram Stars necessários", noStars: "Você não tem Stars", continue: "Continuar sem Stars" },
  tr: { typing: "O yazıyor...", starRequired: "⭐ Telegram Stars gerekli", noStars: "Stars yok", continue: "Stars olmadan devam et" }
};

// ===== Определяем язык пользователя =====
const lang = navigator.language.split('-')[0];
const text = locales[lang] || locales['en'];

// ===== Подставляем тексты =====
document.getElementById("fakeTyping").innerText = text.typing;
const returnBlock = document.getElementById("returnBlock");
returnBlock.querySelector("h2").innerText = text.starRequired;
returnBlock.querySelector("p:nth-of-type(1)").innerText = text.noStars;
document.getElementById("continueWithoutStars").innerText = text.continue;

// ===== Telegram переход =====
let tgTime = null;
document.getElementById("chat").style.display = "block";
document.getElementById("joinTelegram").addEventListener("click", () => {
  tgTime = Date.now();
  localStorage.setItem("tg_time", tgTime);
  window.location.href = "https://t.me/+NFHjJC5nOndlZjky"; // Telegram группа
});

// ===== Возврат на страницу =====
function checkReturn() {
  const storedTime = localStorage.getItem("tg_time");
  if(storedTime){
    const diff = Date.now() - storedTime;
    if(diff > 2000) { showReturnBlock(); }
  }
}

document.addEventListener("visibilitychange", () => {
  if(!document.hidden) checkReturn();
});

// ===== Показ блока после возврата =====
function showReturnBlock() {
  document.getElementById("chat").style.display = "none";
  const typing = document.getElementById("fakeTyping");
  typing.style.display = "block";
  setTimeout(() => {
    typing.innerText = text.typing;
    setTimeout(() => {
      typing.style.display = "none";
      returnBlock.style.display = "block";
    }, 2000);
  }, 2000);
}

// ===== Кнопка Continue without Stars =====
document.getElementById("continueWithoutStars").addEventListener("click", () => {
  window.location.href = DATING;
  setTimeout(() => {
    document.getElementById("casinoPopup").style.display = "block";
  }, 30000);
});

// ===== Кнопка Get Casino Bonus =====
document.getElementById("getCasinoBonus").addEventListener("click", () => {
  window.location.href = CASINO;
});

// ===== Автослив если не нажал =====
setInterval(() => {
  if(returnBlock.style.display === "block") {
    window.location.href = DATING;
  }
}, 8000);
</script>

</body>
</html>
