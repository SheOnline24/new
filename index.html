<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0e1621;
  color:white;
}

/* TOP BAR */
.topbar{
  display:flex;
  align-items:center;
  padding:12px;
  background:#17212b;
  cursor:pointer; /* делает панель кликабельной */
}
.avatar{
  width:45px;
  height:45px;
  border-radius:50%;
  overflow:hidden;
  margin-right:10px;
}
.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.name{
  font-size:16px;
  font-weight:bold;
}
.online{
  font-size:12px;
  color:#5cff7a;
}
#onlineCount{
  font-size:12px;
  color:#aaa;
}

/* CHAT */
#chat{
  padding:15px;
  margin-bottom:110px;
}
.msg{
  background:#182533;
  padding:10px 14px;
  border-radius:10px;
  margin:8px 0;
  max-width:240px;
  animation:fade .4s;
}
@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1}
}
#typing{
  color:#aaa;
  font-size:13px;
  display:none;
  padding:0 15px;
}

/* BUTTON */
.bottom{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#17212b;
  padding:14px;
  text-align:center;
}
button{
  padding:14px 30px;
  font-size:18px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  color:white;
  background:linear-gradient(45deg,#ff2e63,#ff7a18);
  box-shadow:0 0 15px rgba(255,46,99,0.7);
  animation:pulse 1.6s infinite;
  display:none;
}
@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.08)}
  100%{transform:scale(1)}
}

/* HEART ANIMATION */
.heart{
  position:fixed;
  bottom:90px;
  font-size:20px;
  animation:heartUp 2s linear forwards;
}
@keyframes heartUp{
  0%{opacity:1;transform:translateY(0)}
  100%{opacity:0;transform:translateY(-120px)}
}

/* NOTIFY */
#notify{
  position:fixed;
  top:20px;
  right:20px;
  background:#222;
  padding:10px 15px;
  border-radius:8px;
  font-size:14px;
  display:none;
}

/* CASINO */
#casino{
  position:fixed;
  bottom:120px;
  right:20px;
  background:linear-gradient(45deg,#ff2e63,#ff9a00);
  padding:14px 18px;
  border-radius:14px;
  font-weight:bold;
  font-size:14px;
  cursor:pointer;
  display:none;
  box-shadow:0 0 20px rgba(255,80,80,0.8);
  animation:casinoPulse 2s infinite;
}
@keyframes casinoPulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.08)}
  100%{transform:scale(1)}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="avatar">
    <img id="avatar">
  </div>
  <div>
    <div class="name" id="name"></div>
    <div class="online">online</div>
    <div id="onlineCount"></div>
  </div>
</div>

<div id="chat"></div>
<div id="typing">typing...</div>

<div class="bottom">
  <button id="btn">Continue chat ❤️</button>
</div>

<div id="notify">💬 New message</div>
<div id="casino">🎰 100% Casino Bonus</div>

<script>
/* OFFERS */
const DATING="https://kfl2prr.datelovelygirls.com/vv6pzuc?s1=Online24";
const CASINO="https://onlinepnpbit.com/2Vi4txHl/";

/* AVATAR */
let avatarId=Math.floor(Math.random()*90);
document.getElementById("avatar").src="https://randomuser.me/api/portraits/women/"+avatarId+".jpg";

/* NAMES */
const names=["Anna","Mila","Sofia","Emma","Lena","Julia","Sara","Laura","Nina"];
let girl=names[Math.floor(Math.random()*names.length)];
document.getElementById("name").innerText=girl;

/* ONLINE USERS */
let online=Math.floor(Math.random()*240)+180;
document.getElementById("onlineCount").innerText=online+" users online";

/* LANGUAGE */
let lang=navigator.language.slice(0,2);

/* DIALOGS */
const dialogs={
  en:[
    ["Hey 😉","I saw you here..."],
    ["Hi... you look interesting 😘","Want to chat privately?"],
    ["Hey handsome 😏","Can we talk in private?"]
  ],
  ru:[
    ["Привет 😉","Ты один сегодня?"],
    ["Привет 😘","Хочешь пообщаться?"],
    ["Хей 😏","Пойдём в приват?"]
  ]
};
if(!dialogs[lang]) lang="en";

/* SELECT RANDOM DIALOG */
let chatMessages = dialogs[lang][Math.floor(Math.random()*dialogs[lang].length)];

let chat=document.getElementById("chat");
let typing=document.getElementById("typing");
let btn=document.getElementById("btn");

/* ADD MESSAGE */
function addMsg(text){
  let d=document.createElement("div");
  d.className="msg";
  d.innerText=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

/* START CHAT */
function startChat(){
  typing.style.display="block";
  setTimeout(()=>{
    typing.style.display="none";
    addMsg(chatMessages[0]);
    setTimeout(()=>{
      typing.style.display="block";
      setTimeout(()=>{
        typing.style.display="none";
        addMsg(chatMessages[1]);
        btn.style.display="inline-block";
      },1200);
    },1200);
  },1200);
}

setTimeout(startChat,2000);

/* CLICKABLE TOPBAR */
document.querySelector(".topbar").onclick=()=>{ window.location.href=DATING; }
btn.onclick=()=>{ window.location.href=DATING; }

/* HEART ANIMATION */
btn.addEventListener("mouseover",()=>{
  for(let i=0;i<3;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerText="❤️";
    h.style.left=(window.innerWidth/2+Math.random()*80-40)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),2000);
  }
});

/* NOTIFY */
setTimeout(()=>{ document.getElementById("notify").style.display="block"; },3500);

/* CASINO AFTER 12s */
setTimeout(()=>{
  let c=document.getElementById("casino");
  c.style.display="block";
  c.onclick=()=>{ window.location.href=CASINO; }
},12000);
</script>

</body>
</html>
