<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Chat</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0e1621;
  color:white;
}
/* TOP BAR */
.topbar{
  display:flex;
  align-items:center;
  padding:12px;
  background:#17212b;
}
.avatar{
  width:50px;
  height:50px;
  border-radius:50%;
  overflow:hidden;
  margin-right:10px;
}
.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.name{
  font-size:16px;
  font-weight:bold;
}
.online{
  font-size:12px;
  color:#5cff7a;
}
#onlineCount{
  font-size:12px;
  color:#aaa;
}
/* CHAT */
#chat{
  padding:15px;
  margin-bottom:110px;
}
.msg{
  background:#182533;
  padding:10px 14px;
  border-radius:10px;
  margin:8px 0;
  max-width:240px;
  opacity:0;
  transform:translateY(10px);
  animation:fade 0.4s forwards;
}
@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
#typing{
  color:#aaa;
  font-size:13px;
  display:none;
  padding:0 15px;
}
/* BUTTON */
.bottom{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#17212b;
  padding:14px;
  text-align:center;
}
button{
  padding:14px 30px;
  font-size:18px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  color:white;
  background:linear-gradient(45deg,#ff2e63,#ff7a18);
  box-shadow:0 0 15px rgba(255,46,99,0.7);
  animation:pulse 1.6s infinite;
  display:none;
  transition:0.3s all;
}
button:hover{
  transform:scale(1.1);
  box-shadow:0 0 25px rgba(255,46,99,1);
}
/* HEART ANIMATION */
.heart{
  position:fixed;
  bottom:90px;
  font-size:20px;
  animation:heartUp 2s linear forwards;
}
@keyframes heartUp{
  0%{opacity:1;transform:translateY(0)}
  100%{opacity:0;transform:translateY(-120px)}
}
/* CASINO */
#casino{
  position:fixed;
  bottom:120px;
  right:20px;
  background:linear-gradient(45deg,#ff2e63,#ff9a00);
  padding:14px 18px;
  border-radius:14px;
  font-weight:bold;
  font-size:14px;
  cursor:pointer;
  display:none;
  box-shadow:0 0 20px rgba(255,80,80,0.8);
  animation:casinoPulse 2s infinite;
}
@keyframes casinoPulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.08)}
  100%{transform:scale(1)}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="avatar">
    <img id="avatar">
  </div>
  <div>
    <div class="name" id="name"></div>
    <div class="online">online</div>
    <div id="onlineCount"></div>
  </div>
</div>

<div id="chat"></div>
<div id="typing">typing...</div>

<div class="bottom">
  <button id="btn">Continue chat ❤️</button>
</div>

<div id="casino">🎰 100% Casino Bonus</div>

<script>
// ===== LINKS =====
const DATING="https://kfl2prr.datelovelygirls.com/vv6pzuc?s1=Online24";
const CASINO="https://onlinepnpbit.com/2Vi4txHl/";

// ===== AVATAR =====
let avatarId=Math.floor(Math.random()*90);
document.getElementById("avatar").src="https://randomuser.me/api/portraits/women/"+avatarId+".jpg";

// ===== NAMES =====
const names=["Anna","Mila","Sofia","Emma","Lena","Julia","Sara","Laura","Nina"];
let girl=names[Math.floor(Math.random()*names.length)];
document.getElementById("name").innerText=girl;

// ===== ONLINE USERS =====
let online=Math.floor(Math.random()*240)+180;
document.getElementById("onlineCount").innerText=online+" users online";

// ===== LANG =====
let lang=navigator.language.slice(0,2);
const dialogs={
  en:[["Hey 😉","I saw you here..."],["Hi 😘","Want to chat privately?"],["Hey handsome 😏","Can we talk in private?"]],
  ru:[["Привет 😉","Я тебя заметила"],["Привет 😘","Хочешь пообщаться?"],["Хей 😏","Пойдём в приват?"]],
  de:[["Hey 😉","Bist du allein?"],["Hallo 😘","Willst du privat chatten?"],["Hi 😏","Können wir privat reden?"]],
  fr:[["Salut 😉","Tu es seule?"],["Coucou 😘","Veux-tu discuter en privé?"],["Hey 😏","On parle en privé?"]],
  es:[["Hola 😉","¿Estás sola?"],["Hola 😘","¿Quieres chatear en privado?"],["Hey 😏","¿Hablamos en privado?"]],
  it:[["Ciao 😉","Sei sola?"],["Hey 😘","Vuoi chattare in privato?"],["Salve 😏","Parliamo in privato?"]],
  pt:[["Oi 😉","Está sozinha?"],["Olá 😘","Quer conversar em privado?"],["Hey 😏","Podemos falar em privado?"]],
  nl:[["Hey 😉","Ben je alleen?"],["Hoi 😘","Wil je privé chatten?"],["Hey 😏","Kunnen we privé praten?"]],
  ja:[["やあ 😉","一人ですか？"],["こんにちは 😘","プライベートで話しますか？"],["ねえ 😏","プライベートで話せる？"]],
  zh:[["嘿 😉","你一个人吗？"],["嗨 😘","想私聊吗？"],["嘿 😏","我们可以私下聊吗？"]]
};
if(!dialogs[lang]) lang="en";
let msgs=dialogs[lang][Math.floor(Math.random()*dialogs[lang].length)];

let chat=document.getElementById("chat");
let typing=document.getElementById("typing");
let btn=document.getElementById("btn");

// ===== CHAT FUNCTION =====
function addMsg(t){
  let d=document.createElement("div");
  d.className="msg";
  d.innerText=t;
  chat.appendChild(d);
}

function startChat(){
  typing.style.display="block";
  setTimeout(()=>{
    typing.style.display="none";
    addMsg(msgs[0]);
    setTimeout(()=>{
      typing.style.display="block";
      setTimeout(()=>{
        typing.style.display="none";
        addMsg(msgs[1]);
        btn.style.display="inline-block";
      },1200);
    },rand(1000,1500));
  },1200);
}

setTimeout(startChat,2000);

// ===== BUTTON =====
btn.onclick=()=>{ window.location.href=DATING; }
btn.addEventListener("mouseover",()=>{
  for(let i=0;i<3;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerText="❤️";
    h.style.left=(window.innerWidth/2+Math.random()*80-40)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),2000);
  }
});

// ===== CASINO =====
setTimeout(()=>{
  let c=document.getElementById("casino");
  c.style.display="block";
  c.style.opacity="0";
  c.style.transform="scale(0.8)";
  setTimeout(()=>{
    c.style.transition="all 0.6s ease";
    c.style.opacity="1";
    c.style.transform="scale(1)";
  },50);
  c.onclick=()=>{window.location.href=CASINO;}
},12000);

// ===== RANDOM DELAY =====
function rand(min,max){return Math.floor(Math.random()*(max-min))+min;}
</script>

</body>
</html>
