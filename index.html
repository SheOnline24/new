<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#0f0f0f;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
text-align:center;
padding:20px;
}

.chat{
font-size:18px;
margin-bottom:25px;
min-height:60px;
}

.btn{
padding:14px 22px;
border-radius:14px;
font-size:16px;
border:none;
cursor:pointer;
}

.ios{background:#007aff;}
.android{background:#2ecc71;}

</style>
</head>

<body>

<div class="container">

<div class="chat" id="chat"></div>

<button class="btn" id="mainBtn"></button>

</div>

<script>

// ссылки
const TG="https://t.me/+NFHjJC5nOndlZjky";
const DATING="https://tone.affomelody.com/click?pid=6350&offer_id=25";
const CASINO="https://onlinepnpbit.com/2Vi4txHl/";

// язык
let lang=(navigator.language||"en").slice(0,2);

const texts={
en:{
chat:["She is online...","Waiting for your message 💬"],
btn:"Join Telegram",
returnText:"No Stars? Try free 👇",
returnBtn:"Continue free"
},
ru:{
chat:["Она онлайн...","Ждёт твоё сообщение 💬"],
btn:"Перейти в Telegram",
returnText:"Нет Stars? Попробуй бесплатно 👇",
returnBtn:"Продолжить бесплатно"
}
};

if(!texts[lang]) lang="en";

const chat=document.getElementById("chat");
const btn=document.getElementById("mainBtn");

// стиль кнопки
const isIOS=/iphone|ipad/i.test(navigator.userAgent);
btn.classList.add(isIOS?"ios":"android");

// состояние
let stage=localStorage.getItem("stage")||"start";

// первая страница
function showTelegram(){

let i=0;

function typeChat(){

if(i<texts[lang].chat.length){

chat.innerText=texts[lang].chat[i];

i++;

setTimeout(typeChat,1500);

}

}

typeChat();

btn.innerText=texts[lang].btn;

btn.onclick=()=>{

localStorage.setItem("stage","tg");

window.location.href=TG;

};

}

// страница возврата
function showDating(){

chat.innerText=texts[lang].returnText;

btn.innerText=texts[lang].returnBtn;

btn.onclick=()=>{

localStorage.setItem("stage","dating");

window.open(DATING,"_blank"); // открываем в новой вкладке

};

}

// history ловушка
history.pushState({page:1},"");

window.addEventListener("popstate",()=>{

let stage=localStorage.getItem("stage");

if(stage==="tg"){

showDating();

localStorage.setItem("stage","dating_wait");

history.pushState({page:2},"");

}

else if(stage==="dating_wait"){

window.location.href=CASINO;

}

});

// запуск
if(stage==="dating_wait"){
showDating();
}else{
showTelegram();
}

</script>

</body>
</html>
