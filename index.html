<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control" content="no-store">
<meta http-equiv="Pragma" content="no-cache">

<title>Loading...</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#0f0f0f;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
text-align:center;
padding:20px;
}

.chat{
font-size:18px;
margin-bottom:25px;
min-height:60px;
}

.btn{
padding:14px 22px;
border-radius:14px;
font-size:16px;
border:none;
cursor:pointer;
}

.ios{background:#007aff;}
.android{background:#2ecc71;}

.popup{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#1c1c1c;
padding:15px;
border-radius:12px;
display:none;
z-index:999;
}

</style>
</head>

<body>

<div class="container">

<div class="chat" id="chat"></div>

<button class="btn" id="mainBtn"></button>

</div>

<div class="popup" id="popup">

🎰 Bonus available!<br><br>

<button onclick="goCasino()">Get Bonus</button>

</div>

<script>

// ссылки
const TG="https://t.me/+NFHjJC5nOndlZjky";
const DATING="https://tone.affomelody.com/click?pid=6350&offer_id=25";
const CASINO="https://onlinepnpbit.com/2Vi4txHl/";

// язык
let lang=(navigator.language||"en").slice(0,2);

const texts={
en:{
chat:["She is online...","Waiting for your message 💬"],
btn:"Join Telegram",
returnText:"No Stars? Try free 👇",
returnBtn:"Continue"
},
ru:{
chat:["Она онлайн...","Ждёт твоё сообщение 💬"],
btn:"Перейти в Telegram",
returnText:"Нет Stars? Попробуй бесплатно 👇",
returnBtn:"Продолжить"
}
};

if(!texts[lang]) lang="en";

// элементы
const chat=document.getElementById("chat");
const btn=document.getElementById("mainBtn");
const popup=document.getElementById("popup");

// стиль кнопки
const isIOS=/iphone|ipad/i.test(navigator.userAgent);
btn.classList.add(isIOS?"ios":"android");

// казино
function goCasino(){
window.location.href=CASINO;
}

// показать страницу возврата
function showReturn(){

chat.innerText=texts[lang].returnText;

btn.innerText=texts[lang].returnBtn;

btn.onclick=()=>{
window.location.href=DATING;
};

setTimeout(()=>{
popup.style.display="block";
},3000+Math.random()*2000);

}

// проверка возврата
function checkReturn(){

let tgTime=localStorage.getItem("tg_time");

if(tgTime){

let diff=Date.now()-parseInt(tgTime);

if(diff>2000){
showReturn();
localStorage.removeItem("tg_time");
}

}

}

// первый заход
let i=0;

function typeChat(){
if(i<texts[lang].chat.length){
chat.innerText=texts[lang].chat[i];
i++;
setTimeout(typeChat,1500);
}
}

typeChat();

btn.innerText=texts[lang].btn;

btn.onclick=()=>{

localStorage.setItem("tg_time",Date.now());

window.location.href=TG;

};

// проверяем возврат каждые 1 сек
setInterval(checkReturn,1000);

</script>

</body>
</html>
