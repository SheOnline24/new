<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

#chat{
margin-top:30px;
}

.message{
background:#222;
padding:10px;
border-radius:10px;
margin:8px auto;
max-width:260px;
font-size:14px;
opacity:0;
transform:translateY(10px);
animation:fade 0.5s forwards;
}

@keyframes fade{
to{
opacity:1;
transform:translateY(0);
}
}

#typing{
display:none;
margin-top:10px;
color:#aaa;
}

button{
padding:14px 25px;
font-size:18px;
background:#ff2e63;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:20px;
display:none;
}

</style>
</head>

<body>

<h3>Online chat</h3>

<div id="typing">typing...</div>

<div id="chat"></div>

<button id="continue">Continue chat</button>

<script>

const DATING="https://kfl2prr.datelovelygirls.com/vv6pzuc?s1=Online24";

const chatDialogs={

en:[
["Hey sexy 😉","Are you alone tonight?"],
["Hi... I saw you here 😘","Want to chat privately?"],
["You look interesting 😏","Where are you from?"],
["Hey... I like your vibe 💋","Are you single?"],
["Mmm you look cute 😍","Can we talk in private?"],
["Hi there 😉","I want to tell you something..."],
["Hey handsome 😘","Why are you so quiet?"],
["Hi... I noticed you here 😏","Are you looking for fun?"]
],

de:[
["Hey sexy 😉","Bist du heute alleine?"],
["Hi... ich habe dich gesehen 😘","Wollen wir privat chatten?"],
["Du siehst interessant aus 😏","Woher kommst du?"],
["Hey... ich mag deinen Stil 💋","Bist du single?"]
],

es:[
["Hola sexy 😉","¿Estás solo esta noche?"],
["Hola... te vi aquí 😘","¿Hablamos en privado?"],
["Te ves interesante 😏","¿De dónde eres?"]
],

fr:[
["Salut sexy 😉","Tu es seul ce soir?"],
["Coucou... je t'ai vu ici 😘","On parle en privé?"],
["Tu es intéressant 😏","Tu viens d'où?"]
],

ru:[
["Привет 😉","Ты один сегодня?"],
["Я тебя заметила 😘","Хочешь пообщаться приватно?"],
["Ты выглядишь интересно 😏","Откуда ты?"]
]

};

let userLang=navigator.language.slice(0,2);

if(!chatDialogs[userLang]){
userLang="en";
}

let dialog=chatDialogs[userLang];
let selected=dialog[Math.floor(Math.random()*dialog.length)];

let chat=document.getElementById("chat");
let typing=document.getElementById("typing");
let btn=document.getElementById("continue");

function showMessage(text){

let div=document.createElement("div");
div.className="message";
div.innerText=text;

chat.appendChild(div);

}

function startChat(){

typing.style.display="block";

setTimeout(()=>{

typing.style.display="none";

showMessage(selected[0]);

setTimeout(()=>{

typing.style.display="block";

setTimeout(()=>{

typing.style.display="none";

showMessage(selected[1]);

btn.style.display="inline-block";

},1200);

},1500);

},1000);

}

btn.onclick=()=>{
window.location.href=DATING;
}

setTimeout(startChat,2000);

</script>

</body>
</html>
