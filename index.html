<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Chat</title>
<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  padding: 40px;
}
header {
  width: 120px;
  height: 120px;
  margin: 0 auto 20px;
  border-radius: 50%;
  overflow: hidden;
  position: relative;
  border: 3px solid #00ff9c;
}
header img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}
.online-indicator {
  position: absolute;
  bottom: 8px;
  right: 8px;
  width: 18px;
  height: 18px;
  background: #00ff9c;
  border: 2px solid #111;
  border-radius: 50%;
  box-shadow: 0 0 6px #00ff9c;
}
button {
  padding: 14px 25px;
  font-size: 18px;
  background: #ff2e63;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 20px;
  opacity: 0;
  transform: scale(0.9);
  transition: 0.4s;
}
button.show {
  opacity: 1;
  transform: scale(1);
}
#typing, #chat, #casinoPopup, #newMsgNotice { display: none; margin-top: 30px; }
#newMsgNotice {
  position: fixed;
  top: -60px;
  left: 50%;
  transform: translateX(-50%);
  background: #ff2e63;
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 14px;
  transition: 0.4s;
  z-index: 1000;
}
.message {
  background: #222;
  padding: 10px;
  border-radius: 10px;
  margin: 8px auto;
  max-width: 250px;
  font-size: 14px;
  line-height: 1.3;
  opacity: 0;
  transform: translateY(8px);
  position: relative;
}
.message:after {
  content: "";
  position: absolute;
  left: -8px;
  top: 10px;
  width: 0;
  height: 0;
  border-top: 8px solid transparent;
  border-bottom: 8px solid transparent;
  border-right: 8px solid #222;
}
.translation {
  font-size: 11px;
  color: #aaa;
  margin-top: 4px;
  text-align: left;
}
@keyframes msgFade { to { opacity:1; transform:translateY(0); } }
.online { color: #00ff9c; margin-top: 10px; }
.typingDots { display:flex; justify-content:center; gap:6px; margin-top:10px; }
.typingDots span {
  width: 8px; height: 8px; background:#aaa; border-radius:50%;
  animation: typing 1.4s infinite;
}
.typingDots span:nth-child(2) { animation-delay:0.2s; }
.typingDots span:nth-child(3) { animation-delay:0.4s; }
@keyframes typing {
  0% {opacity:0.2; transform:translateY(0);}
  50% {opacity:1; transform:translateY(-4px);}
  100% {opacity:0.2; transform:translateY(0);}
}
@keyframes pulseButton {
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}

/* ===== CASINO POPUP ===== */
#casinoPopup {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #222;
  padding: 12px 20px;
  border-radius: 14px;
  width: 200px;
  text-align: center;
  font-size: 14px;
  cursor: pointer;
  pointer-events: auto;
  transform: scale(0.8);
  opacity: 0;
  transition: all 0.6s ease;
  z-index: 100;
  box-shadow: 0 0 15px rgba(255,46,99,0.6);
}
#casinoPopup.show {
  opacity: 1;
  transform: scale(1);
}
#casinoPopup.pulse {
  animation: casinoPulse 1.2s infinite alternate;
}
@keyframes casinoPulse {
  0% { transform: scale(1); box-shadow: 0 0 15px rgba(255,46,99,0.6); }
  50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(255,46,99,0.9); }
  100% { transform: scale(1); box-shadow: 0 0 15px rgba(255,46,99,0.6); }
}
#casinoPopup button {
  margin-top: 6px;
  padding: 8px 16px;
  font-size: 14px;
  border-radius: 8px;
  background: #ff2e63;
  border: none;
  color: white;
  cursor: pointer;
}
</style>
</head>
<body>

<div id="newMsgNotice">💬 3 new messages</div>

<header>
<img id="avatar" src="">
<div class="online-indicator"></div>
</header>

<div class="online" id="onlineUsers"></div>

<div id="typing">
  <div class="typingDots"><span></span><span></span><span></span></div>
</div>

<div id="chat">
  <div class="message" id="m1"></div>
  <div class="message" id="m2"></div>
  <div class="message" id="m3"></div>
  <button id="continueBtn">Continue chat</button>
</div>

<div id="casinoPopup">
🎁 Bonus available!<br>
<button id="casinoBtn">Get Bonus</button>
</div>

<script>
// ===== OFFERS =====
const DATING = "https://kfl2prr.datelovelygirls.com/vv6pzuc?s1=Online24";
const CASINO = "https://onlinepnpbit.com/2Vi4txHl/";

// ===== AVATAR =====
let avatarImg = document.getElementById("avatar");
avatarImg.src = "https://randomuser.me/api/portraits/women/"+Math.floor(Math.random()*90)+".jpg";
avatarImg.onerror = ()=>{avatarImg.src="https://randomuser.me/api/portraits/women/45.jpg";};

// ===== ONLINE USERS =====
let users = 120 + Math.floor(Math.random()*60);
let online = document.getElementById("onlineUsers");
online.innerText = users + " users online";
setInterval(()=>{
  let change=Math.floor(Math.random()*3);
  if(change===0) users++; else if(change===1) users--;
  if(users<80) users=80; if(users>220) users=220;
  online.innerText = users + " users online";
},4000);

// ===== RANDOM DELAY =====
function rand(min,max){return Math.floor(Math.random()*(max-min))+min;}

// ===== CHAT ANIMATION + MULTILANGUAGE =====
const chatTexts = [
  "Hey...",
  "Are you alone?",
  "Let's chat privately...",
  "Why are you silent? 🙂",
  "Hi... are you looking for someone?",
  "I just joined this chat",
  "Do you want to talk with me?",
  "Hey, I'm here too 🙂",
  "Hello! Nice to meet you"
];

const languages = ['es','fr','de','zh','hi','ar','ru','pt','ja','it']; // 10 популярных языков

function translateText(text){
  // Простая имитация перевода: просто добавляем язык код для демонстрации
  let result = '';
  for(let lang of languages){
    result += `[${lang}]: ${text} \n`;
  }
  return result;
}

function showMessage(id, delay){
  setTimeout(()=>{
    let msg=document.getElementById(id);
    msg.style.opacity="0";
    msg.style.animation="none";
    void msg.offsetWidth; // force reflow
    let text = chatTexts[Math.floor(Math.random()*chatTexts.length)];
    msg.innerHTML = text + '<div class="translation">'+translateText(text)+'</div>';
    msg.style.animation="msgFade 0.6s forwards";
  }, delay);
}

// Показываем сообщения после печати
let typing = document.getElementById("typing");
let chat = document.getElementById("chat");
let btn = document.getElementById("continueBtn");
typing.style.display="block";
chat.style.display="block";

setTimeout(()=>{
  typing.style.display="none";
  showMessage("m1", 0);
  showMessage("m2", rand(1500,2000));
  showMessage("m3", rand(3000,4000));
},2000);

// ===== SHOW BUTTON =====
setTimeout(()=>{
  btn.style.display="inline-block";
  setTimeout(()=>{btn.classList.add("show");},100);
},7000);

// ===== PULSE BUTTON =====
setInterval(()=>{
  btn.style.animation="pulseButton 0.6s ease";
  setTimeout(()=>{btn.style.animation="";},600);
},8000);

// ===== BUTTON CLICK =====
btn.onclick=()=>{ if(Math.random()<0.7) window.location.href=DATING; else window.location.href=CASINO; };

// ===== CASINO POPUP =====
setTimeout(()=>{
  let pop=document.getElementById("casinoPopup");
  pop.classList.add("show");
  setTimeout(()=>{pop.classList.add("pulse");},500);
  pop.onclick=()=>{ window.location.href=CASINO; };
  document.getElementById("casinoBtn").onclick = (e)=>{
    e.stopPropagation();
    window.location.href = CASINO;
  };
},10000);

// ===== NEW MESSAGE NOTICE =====
setTimeout(()=>{
  let notice=document.getElementById("newMsgNotice");
  notice.style.top="20px";
  setTimeout(()=>{notice.style.top="-60px";},4000);
},12000);

// ===== ANTI BACK =====
history.pushState(null,null,location.href);
window.onpopstate=()=>{history.pushState(null,null,location.href); window.location.href=DATING;};
</script>
</body>
</html>
