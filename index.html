<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<script>

// список партнерок
const links = [
"https://tone.affomelody.com/click?pid=6350&offer_id=25",
"https://rdlwl.llovellydates.com/?utm_source=da57dc555e50572d&ban=tg",
"https://example.com"
];

// случайная ссылка
function getRandomLink(){
return links[Math.floor(Math.random()*links.length)];
}

// редирект
function go(){
window.location.replace(getRandomLink());
}

// запуск при загрузке
window.onload = function(){
setTimeout(go,50);
};

// запуск при возврате назад
window.onpageshow = function(){
setTimeout(go,50);
};

</script>

</head>

<body>

<h2 style="text-align:center;margin-top:40vh;font-family:sans-serif;">
Loading...
</h2>

</body>
</html>
