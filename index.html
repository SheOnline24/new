<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirect</title>
</head>
<body>
<script>
// ===== Ссылки =====
const DATING = "https://tone.affomelody.com/click?pid=6350&offer_id=25";
const CASINO = "https://onlinepnpbit.com/2Vi4txHl/";

// ===== Локальное хранилище =====
const visitedDating = localStorage.getItem("visitedDating");

// ===== Первый заход → дейтинг =====
if (!visitedDating) {
    // Запоминаем, что пользователь перешёл на дейтинг
    localStorage.setItem("visitedDating", "1");
    // Редирект на дейтинг
    window.location.href = DATING;
} else {
    // Любое возвращение на эту страницу после того, как он ушёл с дейтинга
    // → сразу казино
    window.location.href = CASINO;
}
</script>
</body>
</html>
