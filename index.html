<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
body {margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f0f0f;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;}
.container {text-align:center;padding:20px;}
.chat {font-size:18px;margin-bottom:25px;min-height:60px;}
.btn {padding:14px 22px;border-radius:14px;font-size:16px;border:none;cursor:pointer;}
.ios {background:#007aff;}
.android {background:#2ecc71;}
.popup {position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1c1c1c;padding:15px;border-radius:12px;display:none;z-index:999;}
</style>
</head>
<body>
<div class="container">
  <div class="chat" id="chat"></div>
  <button class="btn" id="mainBtn"></button>
</div>

<div class="popup" id="popup">
  🎰 Bonus available!<br><br>
  <button onclick="goCasino()">Get Bonus</button>
</div>

<script>
// --- ссылки
const TG = "https://t.me/+NFHjJC5nOndlZjky";
const DATING = "https://tone.affomelody.com/click?pid=6350&offer_id=25";
const CASINO = "https://onlinepnpbit.com/2Vi4txHl/";

// --- состояния
let redirected = false;
let active = false;
let startTime = Date.now();
let interactionCount = 0;

// --- язык
let lang = (navigator.language || "en").slice(0,2);
const texts = {
  en:{chat:["She is online...","Waiting for your message 💬"],btn:"Join Telegram",returnText:"No Stars? Try free 👇",returnBtn:"Continue"},
  ru:{chat:["Она онлайн...","Ждёт твоё сообщение 💬"],btn:"Перейти в Telegram",returnText:"Нет Stars? Попробуй бесплатно 👇",returnBtn:"Продолжить"},
  de:{chat:["Sie ist online...","Wartet auf dich 💬"],btn:"Telegram öffnen",returnText:"Keine Stars? Kostenlos testen 👇",returnBtn:"Weiter"},
  fr:{chat:["Elle est en ligne...","Elle t'attend 💬"],btn:"Ouvrir Telegram",returnText:"Pas de Stars? Essaye gratuit 👇",returnBtn:"Continuer"}
};
if(!texts[lang]) lang="en";

// --- элементы
const chat=document.getElementById("chat");
const btn=document.getElementById("mainBtn");
const popup=document.getElementById("popup");

// --- стиль кнопки
const isIOS=/iphone|ipad/i.test(navigator.userAgent);
btn.classList.add(isIOS?"ios":"android");

// --- статистика
function getStats(){return JSON.parse(localStorage.getItem("stats")||"{}");}
function saveStats(s){localStorage.setItem("stats",JSON.stringify(s));}

// --- источник
const urlParams=new URLSearchParams(window.location.search);
let source=urlParams.get("utm_source") || document.referrer || "unknown";

// --- подстройка текста под источник
function sourceTextAdjust(){
  switch(source.toLowerCase()){
    case "telegram": chat.innerText=texts[lang].chat[0]; btn.innerText=texts[lang].btn; break;
    case "adsnetwork": chat.innerText="Special offer just for you 🎁"; btn.innerText="Check this out"; break;
    case "webbanner": chat.innerText="Start chatting instantly 💬"; btn.innerText="Chat now"; break;
    default: chat.innerText=texts[lang].chat[0]; btn.innerText=texts[lang].btn;
  }
}

// --- умный выбор оффера
function chooseOfferAI(){
  let stats=getStats();
  let d=stats.d||1, c=stats.c||1, total=d+c;
  let elapsed=(Date.now()-startTime)/1000;
  let actFactor = interactionCount>3 ? 0.1 : 0.3;
  let dWeight=0.6 + (d/total)*0.4 - actFactor;
  let cWeight=0.4 + (c/total)*0.4 + actFactor;
  let rand=Math.random();
  if(rand<dWeight/(dWeight+cWeight)){stats.d=d+1; saveStats(stats); return DATING;}
  else{stats.c=c+1; saveStats(stats); return CASINO;}
}

// --- переход на казино
function goCasino(){window.location.href=CASINO;}

// --- возврат-дожим
function setupReturnDojimAI(){
  chat.innerText=texts[lang].returnText;
  btn.innerText=texts[lang].returnBtn;
  btn.onclick=()=>{window.location.href=DATING;};

  let stats=getStats(); let d=stats.d||1, c=stats.c||1;
  let probability = c/(c+d);
  let elapsed=(Date.now()-startTime)/1000;
  if(probability>0.25 && interactionCount>0 && elapsed>3){ popup.style.display="block"; }
}

// --- отслеживание активности
["mousemove","touchstart","click","scroll"].forEach(ev=>{document.addEventListener(ev,()=>{active=true; interactionCount++;});});

// --- обработка возврата
function handleReturnAI(){
  if(localStorage.getItem("tg_clicked")){
    setupReturnDojimAI();
  }
}

// --- основной прогрев и логика
function initAI(){
  sourceTextAdjust();
  let i=0;
  function typeChat(){if(i<texts[lang].chat.length){chat.innerText=texts[lang].chat[i];i++;setTimeout(typeChat,1500);}}
  typeChat();

  btn.onclick=()=>{
    redirected=true;
    localStorage.setItem("tg_clicked","1");
    window.location.href=TG;
  };

  setTimeout(()=>{
    if(!redirected) window.location.replace(chooseOfferAI());
  },6000+Math.random()*3000);
}

// --- события возврата
window.addEventListener("pageshow", handleReturnAI);
document.addEventListener("visibilitychange", handleReturnAI);
window.addEventListener("popstate", handleReturnAI);
window.addEventListener("beforeunload", handleReturnAI);

initAI();
</script>
</body>
</html>
