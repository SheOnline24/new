<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Online</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

header{
width:120px;
height:120px;
margin:0 auto 20px;
border-radius:50%;
overflow:hidden;
position:relative;
border:3px solid #00ff9c;
}

header img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
}

.online-indicator{
position:absolute;
bottom:8px;
right:8px;
width:18px;
height:18px;
background:#00ff9c;
border:2px solid #111;
border-radius:50%;
box-shadow:0 0 6px #00ff9c;
}

button{
padding:14px 25px;
font-size:18px;
background:#ff2e63;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:20px;
}

#typing,#chat,#casinoPopup{
display:none;
margin-top:30px;
}

.message{
background:#222;
padding:12px;
border-radius:10px;
margin:10px auto;
max-width:300px;
}

.online{
color:#00ff9c;
margin-top:10px;
}

#casinoPopup{
position:fixed;
bottom:20px;
right:20px;
background:#222;
padding:15px 25px;
border-radius:12px;
display:none;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<img id="avatar">
<div class="online-indicator"></div>
</header>

<div class="online" id="onlineUsers"></div>

<div id="typing">
<span id="typingText">She is typing...</span>
</div>

<div id="chat">

<div class="message" id="m1"></div>
<div class="message" id="m2"></div>
<div class="message" id="m3"></div>

<button id="continueBtn">Continue chat</button>

</div>

<div id="casinoPopup">
🎁 Bonus available!
<br>
<button id="casinoBtn">Get Bonus</button>
</div>

<script>

// ===== ОФФЕРЫ =====

const DATING="https://kfl2prr.datelovelygirls.com/vv6pzuc?s1=Online24";
const CASINO="https://onlinepnpbit.com/2Vi4txHl/";


// ===== RANDOM AVATAR =====

const avatar =
"https://randomuser.me/api/portraits/women/" +
Math.floor(Math.random()*90) +
".jpg";

document.getElementById("avatar").src = avatar;


// ===== ONLINE USERS =====

let users=120+Math.floor(Math.random()*60);

let online=document.getElementById("onlineUsers");

online.innerText=users+" users online";

setInterval(()=>{

if(users>80){

users--;

online.innerText=users+" users online";

}

},5000);


// ===== RANDOM DELAY FUNCTION =====

function rand(min,max){

return Math.floor(Math.random()*(max-min))+min;

}


// ===== CHAT SCENARIO =====

let typing=document.getElementById("typing");

let chat=document.getElementById("chat");

let btn=document.getElementById("continueBtn");

typing.style.display="block";

setTimeout(()=>{

typing.style.display="none";

chat.style.display="block";

document.getElementById("m1").innerText="Hey...";

setTimeout(()=>{

document.getElementById("m2").innerText="Are you alone?";

},rand(900,1600));

setTimeout(()=>{

document.getElementById("m3").innerText="Let's chat privately...";

},rand(1700,2500));

btn.style.display="inline-block";

},rand(2000,4000));


// ===== ROTATION =====

btn.onclick=function(){

var r=Math.random();

if(r<0.7){

window.location.href=DATING;

}else{

window.location.href=CASINO;

}

};


// ===== CASINO POPUP =====

setTimeout(()=>{

let pop=document.getElementById("casinoPopup");

pop.style.display="block";

pop.onclick=function(){

window.location.href=CASINO;

};

},10000);


// ===== ANTI BACK =====

history.pushState(null,null,location.href);

window.onpopstate=function(){

history.pushState(null,null,location.href);

window.location.href=DATING;

};

</script>

</body>
</html>
