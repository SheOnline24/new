<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-store">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Click to Continue</title>
<style>
body{display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;flex-direction:column;}
button{padding:15px 30px;font-size:18px;cursor:pointer;}
</style>
</head>
<body>

<h2>Click to continue</h2>
<button id="goBtn">Continue</button>

<script>
// 0 = Дейтинг (основной), 1 = Казино (доп)
var offers = [
"https://tone.affomelody.com/click?pid=6350&offer_id=25",   // дейтинг
"https://onlinepnpbit.com/2Vi4txHl/"                         // казино
];

// стартовые веса
var weights = JSON.parse(localStorage.getItem("weights")) || [70,30];

// выбор оффера по весам
function chooseOffer(){
    var total = weights[0] + weights[1];
    var r = Math.random() * total;
    return (r < weights[0]) ? 0 : 1;
}

// обучение: если пользователь вернулся назад
window.onpageshow = function(){
    var last = localStorage.getItem("last_offer");
    if(last !== null){
        last = parseInt(last);
        var other = last === 0 ? 1 : 0;
        weights[last] = Math.max(15, weights[last]-5);
        weights[other] = Math.min(85, weights[other]+5);
        localStorage.setItem("weights", JSON.stringify(weights));
    }
}

// кнопка редиректа
document.getElementById("goBtn").onclick = function(){
    var id = chooseOffer();
    localStorage.setItem("last_offer", id);
    var url = offers[id] + "?t=" + Date.now();
    window.location.href = url;
}
</script>

</body>
</html>
