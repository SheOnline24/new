<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control" content="no-store">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Online</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

button{
padding:14px 25px;
font-size:18px;
background:#ff2e63;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:20px;
}

#typing,#chat,#casinoPopup{
display:none;
margin-top:30px;
}

.message{
background:#222;
padding:12px;
border-radius:10px;
margin:10px auto;
max-width:300px;
}

.online{
color:#00ff9c;
margin-top:10px;
}

</style>
</head>

<body>

<h1 id="titleText">She is online...</h1>

<div class="online" id="onlineUsers"></div>

<div id="typing">
<span id="typingText"></span>
</div>

<div id="chat">

<div class="message" id="m1"></div>
<div class="message" id="m2"></div>
<div class="message" id="m3"></div>

<button id="continueBtn"></button>

</div>


<div id="casinoPopup">

<h2>🎁 Bonus available!</h2>

<button id="casinoBtn">
Get Bonus
</button>

</div>


<script>


// ===== ТВОИ ОФФЕРЫ =====

const DATING="https://tone.affomelody.com/click?pid=6350&offer_id=25";
const CASINO="https://onlinepnpbit.com/2Vi4txHl/";



// ===== ЯЗЫКИ =====

const locales={

en:{
typing:"She is typing...",
m1:"Hey...",
m2:"Are you alone?",
m3:"Let's chat privately...",
btn:"Continue chat",
online:"users online"
},

ru:{
typing:"Она печатает...",
m1:"Привет...",
m2:"Ты один?",
m3:"Давай пообщаемся...",
btn:"Продолжить чат",
online:"пользователей онлайн"
},

de:{
typing:"Sie tippt...",
m1:"Hey...",
m2:"Bist du allein?",
m3:"Lass uns privat chatten...",
btn:"Chat fortsetzen",
online:"Benutzer online"
},

fr:{
typing:"Elle écrit...",
m1:"Salut...",
m2:"Tu es seul?",
m3:"Parlons en privé...",
btn:"Continuer le chat",
online:"utilisateurs en ligne"
},

es:{
typing:"Ella está escribiendo...",
m1:"Hola...",
m2:"Estás solo?",
m3:"Hablemos en privado...",
btn:"Continuar chat",
online:"usuarios en línea"
},

it:{
typing:"Sta scrivendo...",
m1:"Ciao...",
m2:"Sei solo?",
m3:"Parliamo in privato...",
btn:"Continua chat",
online:"utenti online"
}

};


const lang=navigator.language.split("-")[0];
const text=locales[lang]||locales.en;



// ===== ONLINE COUNTER =====

function updateOnline(){

let users=120+Math.floor(Math.random()*60);

document.getElementById("onlineUsers").innerText=
users+" "+text.online;

}

updateOnline();
setInterval(updateOnline,5000);



// ===== TYPING =====

const typing=document.getElementById("typing");
typing.style.display="block";
document.getElementById("typingText").innerText=text.typing;

setTimeout(startChat,3000);



// ===== CHAT =====

function startChat(){

typing.style.display="none";

const chat=document.getElementById("chat");
chat.style.display="block";

setTimeout(()=>{
document.getElementById("m1").innerText=text.m1;
},1000);

setTimeout(()=>{
document.getElementById("m2").innerText=text.m2;
},3000);

setTimeout(()=>{
document.getElementById("m3").innerText=text.m3;
},5000);

}



document.getElementById("continueBtn").innerText=text.btn;



// ===== ПЕРЕХОД НА DATING =====

document.getElementById("continueBtn").onclick=function(){

window.location.href=DATING;

};



// ===== CASINO POPUP =====

setTimeout(function(){

document.getElementById("casinoPopup").style.display="block";

},25000);



document.getElementById("casinoBtn").onclick=function(){

window.location.href=CASINO;

};



// ===== TITLE ANIMATION =====

const titles=["Online","● New message 💬","She is typing...","Online"];

let i=0;

setInterval(function(){

document.title=titles[i];

i++;

if(i>=titles.length){i=0;}

},2000);


</script>

</body>

</html>
